<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Hữu Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="auth-page">
      <form id="login-form" class="auth-form" method="POST">
        <h1>Đăng nhập</h1>

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Nhập email của bạn"
          required
        />

        <label for="password">Mật khẩu</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Nhập mật khẩu"
          required
        />

        <button type="submit">Đăng nhập</button>

        <!-- Thêm link đăng ký (đối xứng với trang đăng ký) -->
        <p style="text-align: center; margin-top: 20px; color: #555">
          Chưa có tài khoản?
          <a
            href="register.html"
            style="color: #c51e3a; font-weight: bold; text-decoration: none"
          >
            Đăng ký ngay
          </a>
        </p>
      </form>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
