<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Người Dùng</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* RESET & THEME */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #1e40af;
        --primary-dark: #1e3a8a;
        --primary-light: #3b82f6;
        --secondary: #06b6d4;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --bg: #f0f4f8;
        --bg-light: #f9fafb;
        --card: #ffffff;
        --card-hover: #f8fafc;
        --text: #1f2937;
        --text-light: #6b7280;
        --border: #e5e7eb;
        --border-light: #f3f4f6;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.1);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        background: linear-gradient(135deg, var(--bg) 0%, var(--bg-light) 100%);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }

      /* NAVBAR */
      nav {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        box-shadow: var(--shadow-md);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 0 2rem;
      }

      nav ul {
        display: flex;
        list-style: none;
        flex-wrap: wrap;
        gap: 0;
      }

      nav li {
        flex: 1;
        min-width: 150px;
      }

      nav a {
        display: block;
        padding: 1rem;
        color: white;
        text-decoration: none;
        transition: all 0.3s ease;
        text-align: center;
      }

      nav a:hover {
        background: rgba(255, 255, 255, 0.1);
        border-bottom: 3px solid var(--secondary);
      }

      nav a.active {
        background: rgba(255, 255, 255, 0.15);
        border-bottom: 4px solid var(--secondary);
        font-weight: 600;
      }

      /* PAGE HEADER */
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2rem;
        background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary) 100%);
        color: white;
        margin-bottom: 2rem;
        border-radius: 8px;
        margin: 2rem;
        margin-bottom: 2rem;
      }

      .page-header h1 {
        font-size: 2rem;
        font-weight: 700;
      }

      .add-btn-label {
        background: var(--success);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        user-select: none;
      }

      .add-btn-label:hover {
        background: #059669;
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      /* CONTAINER & LAYOUT */
      .page-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem 2rem;
      }

      .content-wrapper {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      /* FORM */
      #toggle-form {
        display: none;
      }

      .form-container {
        background: var(--card);
        border-radius: 8px;
        padding: 2rem;
        box-shadow: var(--shadow-sm);
        margin-bottom: 2rem;
        display: none;
      }

      #toggle-form:checked ~ .page-content .form-container {
        display: block;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text);
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
      }

      .form-actions {
        display: flex;
        gap: 1rem;
        justify-content: flex-start;
      }

      .form-actions button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .form-actions .save-btn {
        background: var(--success);
        color: white;
      }

      .form-actions .save-btn:hover {
        background: #059669;
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .form-actions .cancel-btn {
        background: var(--border);
        color: var(--text);
      }

      .form-actions .cancel-btn:hover {
        background: #d1d5db;
      }

      /* TABLE STYLES */
      .table-container {
        background: var(--card);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }

      .table-header {
        padding: 1rem 1.5rem;
        background: var(--primary-light);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .table-header h2 {
        font-size: 1.25rem;
      }

      .search-box {
        display: flex;
        gap: 0.5rem;
      }

      .search-box input {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        width: 250px;
      }

      .search-box button {
        padding: 0.5rem 1rem;
        background: white;
        color: var(--primary);
        border: 1px solid var(--primary);
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .search-box button:hover {
        background: var(--primary);
        color: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead th {
        background: var(--bg-light);
        padding: 1rem 1.5rem;
        text-align: left;
        font-weight: 600;
        color: var(--text);
        border-bottom: 2px solid var(--border);
      }

      tbody td {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
      }

      tbody tr:hover {
        background: var(--card-hover);
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      /* ACTION BUTTONS */
      .action-cell {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-edit {
        background: var(--primary);
        color: white;
      }

      .btn-edit:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }

      .btn-delete {
        background: var(--danger);
        color: white;
      }

      .btn-delete:hover {
        background: #dc2626;
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }

      .btn-refresh {
        background: var(--secondary);
        color: white;
      }

      .btn-refresh:hover {
        background: #0891b2;
      }

      /* EMPTY STATE */
      .empty-state {
        text-align: center;
        padding: 3rem 2rem;
        color: var(--text-light);
      }

      .empty-state svg {
        width: 80px;
        height: 80px;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.3s ease;
      }

      .modal.show {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background: var(--card);
        padding: 2rem;
        border-radius: 8px;
        max-width: 500px;
        width: 90%;
        box-shadow: var(--shadow-lg);
        animation: slideUp 0.3s ease;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .modal-header h2 {
        margin: 0;
      }

      .close-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text-light);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        nav ul {
          flex-direction: column;
        }

        nav li {
          min-width: 100%;
        }

        .page-header {
          flex-direction: column;
          gap: 1rem;
        }

        .page-header h1 {
          font-size: 1.5rem;
        }

        .table-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .search-box {
          width: 100%;
        }

        .search-box input {
          width: 100%;
        }

        table {
          font-size: 0.875rem;
        }

        thead th,
        tbody td {
          padding: 0.75rem;
        }

        .action-cell {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="admin.html">Quản lý sản phẩm</a></li>
        <li><a href="categories.html">Quản lý danh mục</a></li>
        <li><a href="orders.html">Quản lý đơn hàng</a></li>
        <li><a href="users.html" class="active">Quản lý người dùng</a></li>
      </ul>
    </nav>

    <!-- Checkbox ẩn để toggle form -->
    <input type="checkbox" id="toggle-form" />

    <div class="page-header">
      <h1>Quản Lý Người Dùng</h1>
      <label for="toggle-form" class="add-btn-label">
        <span style="font-size: 20px; font-weight: bold">+</span> Thêm Người
        Dùng Mới
      </label>
    </div>

    <div class="page-content">
      <!-- Form thêm/sửa người dùng -->
      <div class="form-container">
        <h2 id="form-title">Thêm Người Dùng Mới</h2>
        <form id="user-form">
          <div class="form-group">
            <label for="user-email">Email *</label>
            <input type="email" id="user-email" required />
          </div>

          <div class="form-group">
            <label for="user-password">Mật khẩu *</label>
            <input type="password" id="user-password" required />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn save-btn">Lưu</button>
            <label for="toggle-form" class="btn cancel-btn" style="margin: 0">
              Huỷ bỏ
            </label>
          </div>
        </form>
      </div>

      <!-- Bảng danh sách người dùng -->
      <div class="table-container">
        <div class="table-header">
          <h2>Danh Sách Người Dùng</h2>
          <div class="search-box">
            <input
              type="text"
              id="search-input"
              placeholder="Tìm theo email..."
            />
            <button id="search-btn">Tìm</button>
            <button type="button" id="users-refresh" class="btn-refresh">
              ⟳ Làm mới
            </button>
          </div>
        </div>
        <div id="users-table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Mật khẩu</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal xem chi tiết -->
    <div id="detail-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Chi Tiết Người Dùng</h2>
          <button class="close-btn" onclick="closeDetailModal()">&times;</button>
        </div>
        <div id="detail-content"></div>
      </div>
    </div>

    <script src="users.js"></script>
  </body>
</html>
